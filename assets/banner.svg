<svg width="1280" height="340" viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Evolved — business management in a box">
  <defs>
    <linearGradient id="aurora" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#39ff14"/>
      <stop offset="0.55" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowband" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4ade80" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.16"/>
      <stop offset="0.6" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur18"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="1280" height="340" fill="#0a0a0a"/>
  <rect width="1280" height="340" fill="url(#halo)"/>

  <!-- aurora ribbons -->
  <path d="M-40,95 C240,25 520,135 780,75 C1000,25 1180,65 1320,35" stroke="url(#aurora)" stroke-width="34" fill="none" opacity="0.20" filter="url(#blur18)"/>
  <path d="M-40,140 C300,70 620,180 900,110 C1080,70 1220,110 1320,85" stroke="url(#aurora)" stroke-width="16" fill="none" opacity="0.30" filter="url(#blur18)"/>
  <path d="M-40,60 C200,110 480,20 760,80 C980,125 1160,45 1320,95" stroke="#22d3ee" stroke-width="8" fill="none" opacity="0.18" filter="url(#blur18)"/>

