    <line x1="0" y1="268" x2="1280" y2="268"/>
    <line x1="0" y1="292" x2="1280" y2="292"/>
    <line x1="0" y1="316" x2="1280" y2="316"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="178" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="26" fill="url(#aurora)">EVOLVED</text>
  <rect x="428" y="200" width="424" height="5" rx="2.5" fill="#39ff14"/>

