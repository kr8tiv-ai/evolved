  <text x="640" y="280" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" letter-spacing="6" fill="#4ade80">MCP AGENTIC SERVICE PROVIDER &#183; BORN ON A REAL JOBSITE &#183; OKX.AI GENESIS</text>

